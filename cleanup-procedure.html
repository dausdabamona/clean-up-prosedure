<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Clean Up Procedure — Sedona Method</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤝</text></svg>">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ====== Palette (light, teal/biru) ====== */
    :root {
      --cup-primary: #2874a6;
      --cup-primary-dark: #1a5276;
      --cup-bg: #f4f7fa;
      --cup-card: #ffffff;
      --cup-text: #1f2d3d;
      --cup-muted: #6b7a8d;
      --cup-border: #e1e8ef;
      --cup-shadow: 0 2px 12px rgba(26, 82, 118, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--cup-bg); color: var(--cup-text);
      font-family: "Segoe UI", system-ui, -apple-system, Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    /* ====== Header ====== */
    .cup-header {
      position: sticky; top: 0; z-index: 20;
      background: linear-gradient(135deg, var(--cup-primary-dark), var(--cup-primary));
      color: #fff; padding: 0.7rem 1rem; display: flex; align-items: center; gap: 0.6rem;
    }
    .cup-back { color: #fff; text-decoration: none; font-size: 1.4rem; line-height: 1; padding: 0.2rem 0.4rem; }
    .cup-header h1 { font-size: 1.05rem; margin: 0; font-weight: 600; }
    .cup-tts-btn { margin-left: auto; background: rgba(255,255,255,0.18); border: none; color: #fff; font-size: 1.1rem; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; flex: 0 0 auto; }
    .cup-tts-btn:active { transform: scale(0.94); }

    /* ====== Progress pills ====== */
    .cup-progress { display: flex; gap: 0.4rem; padding: 0.6rem 1rem; background: var(--cup-card); border-bottom: 1px solid var(--cup-border); overflow-x: auto; }
    .cup-progress-pill { display: flex; align-items: center; gap: 0.3rem; padding: 0.3rem 0.6rem; border-radius: 999px; background: #eef3f7; color: var(--cup-muted); font-size: 0.78rem; white-space: nowrap; border: 1.5px solid transparent; }
    .cup-progress-pill.active { border-color: var(--pill-color, var(--cup-primary)); color: var(--pill-color, var(--cup-primary)); background: #fff; font-weight: 600; }
    .cup-progress-pill.done { background: #d5f5e3; color: #1e8449; }
    .cup-pill-icon { font-size: 0.95rem; }

    /* ====== Tabs ====== */
    .cup-tabs { display: flex; gap: 0.25rem; padding: 0.4rem 0.6rem; background: var(--cup-card); border-bottom: 1px solid var(--cup-border); overflow-x: auto; position: sticky; top: 0; }
    .cup-tab { flex: 0 0 auto; background: none; border: none; padding: 0.45rem 0.7rem; border-radius: 8px; font-size: 0.82rem; color: var(--cup-muted); cursor: pointer; font-family: inherit; }
    .cup-tab.active { background: var(--cup-primary); color: #fff; font-weight: 600; }

    /* ====== Panels ====== */
    .cup-panel { display: none; padding: 1rem; max-width: 560px; margin: 0 auto; }
    .cup-panel.active { display: block; }

    /* ====== Guided stage ====== */
    #cup-stage { min-height: 60vh; }
    .cup-screen { background: var(--cup-card); border-radius: 16px; box-shadow: var(--cup-shadow); padding: 1.5rem 1.25rem; text-align: center; }
    .cup-fade { opacity: 0; transform: translateY(8px); transition: opacity .35s ease, transform .35s ease; }
    .cup-fade.cup-in { opacity: 1; transform: none; }
    .cup-eyebrow { font-size: 0.78rem; color: var(--cup-primary); font-weight: 600; letter-spacing: .02em; margin-bottom: 0.75rem; }
    .cup-screen-icon { font-size: 2.4rem; margin-bottom: 0.5rem; }
    .cup-question { font-size: 1.3rem; line-height: 1.5; font-weight: 600; margin-bottom: 0.6rem; }
    .cup-speaker { display: inline-block; margin: 0 auto 0.5rem; background: #eef3f7; border: none; color: var(--cup-primary); font-size: 0.78rem; cursor: pointer; padding: 0.3rem 0.7rem; border-radius: 999px; }
    .cup-speaker:active { transform: scale(0.96); }
    .cup-sub { font-size: 0.9rem; color: var(--cup-muted); line-height: 1.5; margin-bottom: 0.5rem; }
    .cup-controls { display: flex; flex-direction: column; gap: 0.55rem; margin-top: 1.25rem; }

    /* ====== Buttons ====== */
    .cup-btn { width: 100%; padding: 0.85rem 1rem; border: none; border-radius: 12px; font-size: 1rem; font-family: inherit; cursor: pointer; transition: transform .08s ease, filter .15s ease; }
    .cup-btn:active { transform: scale(0.98); }
    .cup-btn-primary { background: var(--cup-primary); color: #fff; }
    .cup-btn-primary:hover { filter: brightness(1.05); }
    .cup-btn-secondary { background: #eaf2f8; color: var(--cup-primary-dark); }
    .cup-btn-ghost { background: transparent; color: var(--cup-muted); border: 1.5px solid var(--cup-border); }
    .cup-btn-sm { width: auto; padding: 0.4rem 0.7rem; font-size: 0.82rem; }

    /* ====== Forms ====== */
    .cup-form, .cup-field { text-align: left; }
    .cup-field { margin-bottom: 0.9rem; }
    .cup-label { display: block; font-size: 0.82rem; color: var(--cup-muted); margin: 0.6rem 0 0.3rem; font-weight: 600; }
    .cup-input { width: 100%; padding: 0.7rem 0.8rem; border: 1.5px solid var(--cup-border); border-radius: 10px; font-size: 1rem; font-family: inherit; background: #fff; color: var(--cup-text); }
    .cup-input:focus { outline: none; border-color: var(--cup-primary); }
    textarea.cup-input { resize: vertical; }
    .cup-radio-row { display: flex; flex-direction: column; gap: 0.4rem; }
    .cup-radio { display: flex; align-items: center; gap: 0.5rem; font-size: 0.92rem; }

    /* ====== Release counter ====== */
    .cup-release-count { display: flex; flex-direction: column; align-items: center; margin: 0.5rem 0; }
    .cup-count-num { font-size: 2.2rem; font-weight: 700; color: var(--cup-primary); }
    .cup-count-label { font-size: 0.75rem; color: var(--cup-muted); }

    /* ====== Emotion grid + slider (Triple Welcoming) ====== */
    .cup-emo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.4rem; margin: 0.3rem 0 0.5rem; }
    .cup-emo-btn { display: flex; align-items: center; gap: 0.4rem; padding: 0.5rem; border: 1.5px solid var(--cup-border); border-radius: 10px; background: #fff; font-family: inherit; font-size: 0.85rem; cursor: pointer; }
    .cup-emo-btn.selected { border-color: var(--cup-primary); background: #eaf2f8; font-weight: 600; }
    .cup-emo-label { font-size: 0.8rem; }
    .cup-slider-row { display: flex; align-items: center; gap: 0.6rem; }
    .cup-slider { flex: 1; }
    .cup-slider-val { font-weight: 700; color: var(--cup-primary); min-width: 1.5rem; text-align: center; }

    /* ====== Breathing + melting animations ====== */
    .cup-breath-circle { width: 90px; height: 90px; border-radius: 50%; margin: 0.6rem auto; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 0.8rem; background: radial-gradient(circle, var(--cup-primary), var(--cup-primary-dark)); animation: cupBreath 5s ease-in-out infinite; }
    .cup-breath-circle.big { width: 130px; height: 130px; }
    @keyframes cupBreath { 0%,100% { transform: scale(0.8); opacity: .7; } 50% { transform: scale(1.1); opacity: 1; } }
    .cup-breath { cursor: pointer; }

    .cup-melt { position: relative; height: 130px; margin: 0.5rem 0; }
    .cup-melt-c { position: absolute; top: 30px; width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; background: #eaf2f8; transition: all 2s ease; left: 50%; transform: translateX(-50%); }
    .cup-melt-c.c1 { margin-left: -80px; }
    .cup-melt-c.c3 { margin-left: 80px; }
    .cup-melt.melting .cup-melt-c { margin-left: 0; opacity: 0; transform: translateX(-50%) scale(0.4); }

    /* ====== Worksheet ====== */
    .cup-worksheet { text-align: left; }
    .cup-ws-block { background: #f8fafc; border: 1px solid var(--cup-border); border-radius: 12px; padding: 0.8rem; margin-bottom: 0.7rem; text-align: left; }
    .cup-ws-trigger { font-weight: 600; margin-bottom: 0.5rem; }
    .cup-ws-line { display: flex; align-items: center; gap: 0.5rem; justify-content: space-between; padding: 0.35rem 0; border-top: 1px solid var(--cup-border); }
    .cup-ws-q { font-size: 0.88rem; flex: 1; }

    /* ====== Summary ====== */
    .cup-summary-totals { font-size: 0.9rem; color: var(--cup-muted); margin-bottom: 0.8rem; }
    .cup-summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; margin-bottom: 0.8rem; }
    .cup-summary-card { background: #f8fafc; border: 1px solid var(--cup-border); border-radius: 12px; padding: 0.7rem; text-align: center; }
    .cup-summary-icon { font-size: 1.4rem; }
    .cup-summary-name { font-weight: 600; font-size: 0.9rem; }
    .cup-summary-meta { font-size: 0.75rem; color: var(--cup-muted); }

    /* ====== Lists (riwayat/people) ====== */
    .cup-list-card { background: var(--cup-card); border: 1px solid var(--cup-border); border-radius: 12px; padding: 0.8rem; margin-bottom: 0.6rem; box-shadow: var(--cup-shadow); }
    .cup-list-top { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
    .cup-list-meta { font-size: 0.8rem; color: var(--cup-muted); margin-top: 0.3rem; }
    .cup-list-stat { margin-top: 0.4rem; font-weight: 600; color: var(--cup-primary); font-size: 0.85rem; }
    .cup-badge { font-size: 0.72rem; padding: 0.15rem 0.5rem; border-radius: 999px; white-space: nowrap; }
    .cup-badge.done { background: #d5f5e3; color: #1e8449; }
    .cup-badge.ongoing { background: #fdebd0; color: #b9770e; }
    .cup-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--cup-primary); color: #fff; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; margin-right: 0.5rem; }

    /* ====== Dashboard ====== */
    .cup-stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; margin-bottom: 1rem; }
    .cup-stat-card { background: var(--cup-card); border: 1px solid var(--cup-border); border-radius: 12px; padding: 0.7rem; text-align: center; }
    .cup-stat-val { font-size: 1.3rem; font-weight: 700; color: var(--cup-primary); word-break: break-word; }
    .cup-stat-label { font-size: 0.72rem; color: var(--cup-muted); }
    .cup-bar-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
    .cup-bar-label { width: 110px; font-size: 0.8rem; }
    .cup-bar { flex: 1; background: #eef3f7; border-radius: 999px; height: 14px; overflow: hidden; }
    .cup-bar-fill { height: 100%; border-radius: 999px; transition: width .4s ease; }
    .cup-bar-val { width: 28px; text-align: right; font-size: 0.8rem; font-weight: 600; }

    /* ====== Reference ====== */
    .cup-h3 { font-size: 1rem; margin: 1rem 0 0.5rem; }
    .cup-ref-section { background: var(--cup-card); border: 1px solid var(--cup-border); border-radius: 12px; padding: 0.9rem; margin-bottom: 0.7rem; }
    .cup-ref-intro { font-size: 0.85rem; color: var(--cup-muted); }
    .cup-ref-sub { font-weight: 600; font-size: 0.85rem; margin-top: 0.5rem; }
    .cup-ref-list { margin: 0.3rem 0 0.3rem 1.1rem; padding: 0; font-size: 0.85rem; color: var(--cup-text); }
    .cup-ref-list li { margin-bottom: 0.25rem; }

    /* ====== Empty state ====== */
    .cup-empty { text-align: center; color: var(--cup-muted); padding: 2rem 1rem; }
    .cup-empty-icon { font-size: 2.2rem; margin-bottom: 0.4rem; }

    @media (min-width: 600px) {
      .cup-emo-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
  <!-- Header: back to hub -->
  <header class="cup-header">
    <a class="cup-back" href="sedona-app.html" aria-label="Kembali">←</a>
    <h1>🤝 Clean Up Procedure</h1>
    <button class="cup-tts-btn" id="cup-tts-toggle" type="button" aria-label="Suara">🔊</button>
  </header>

  <!-- Progress pills (per wanting) -->
  <div class="cup-progress" id="cup-progress"></div>

  <!-- Tabs -->
  <nav class="cup-tabs">
    <button class="cup-tab active" data-tab="sesi">🧘 Sesi</button>
    <button class="cup-tab" data-tab="riwayat">📜 Riwayat</button>
    <button class="cup-tab" data-tab="people">👥 People</button>
    <button class="cup-tab" data-tab="dashboard">📊 Dashboard</button>
    <button class="cup-tab" data-tab="reference">📖 Reference</button>
    <button class="cup-tab" data-tab="settings">⚙️ Settings</button>
  </nav>

  <!-- Panel: Sesi (guided) -->
  <section class="cup-panel active" id="cup-tab-sesi">
    <div id="cup-stage"></div>
  </section>

  <!-- Panel: Riwayat -->
  <section class="cup-panel" id="cup-tab-riwayat">
    <h2 class="cup-h3">Riwayat Sesi</h2>
    <div id="cup-riwayat-list"></div>
  </section>

  <!-- Panel: People -->
  <section class="cup-panel" id="cup-tab-people">
    <h2 class="cup-h3">Orang yang Di-cleanup</h2>
    <div id="cup-people-list"></div>
  </section>

  <!-- Panel: Dashboard -->
  <section class="cup-panel" id="cup-tab-dashboard">
    <h2 class="cup-h3">Dashboard</h2>
    <div id="cup-dashboard-body"></div>
  </section>

  <!-- Panel: Reference -->
  <section class="cup-panel" id="cup-tab-reference">
    <h2 class="cup-h3">📖 Panduan 4 Wanting</h2>
    <div id="cup-reference-body"></div>
  </section>

  <!-- Panel: Settings -->
  <section class="cup-panel" id="cup-tab-settings">
    <h2 class="cup-h3">Pengaturan</h2>
    <div class="cup-field">
      <label class="cup-label" for="cup-set-api">API URL (Google Apps Script)</label>
      <input class="cup-input" type="text" id="cup-set-api" placeholder="https://script.google.com/.../exec">
    </div>
    <div class="cup-field">
      <label class="cup-label" for="cup-set-name">Nama Default</label>
      <input class="cup-input" type="text" id="cup-set-name" placeholder="Nama kamu">
    </div>
    <div class="cup-field">
      <label class="cup-label" for="cup-set-mode">Mode</label>
      <select class="cup-input" id="cup-set-mode">
        <option value="guided">Terpandu (satu pertanyaan per layar)</option>
        <option value="worksheet">Worksheet (semua sekaligus)</option>
      </select>
    </div>
    <label class="cup-radio"><input type="checkbox" id="cup-set-grounding"> <span>Tampilkan Grounding sebelum mulai</span></label>
    <label class="cup-radio" style="margin-top:0.5rem;"><input type="checkbox" id="cup-set-breath"> <span>Jeda napas antar pertanyaan</span></label>
    <label class="cup-radio" style="margin-top:0.5rem;"><input type="checkbox" id="cup-set-tts"> <span>🔊 Suara — bacakan pertanyaan (TTS)</span></label>
    <div class="cup-controls" style="margin-top:1rem;">
      <button class="cup-btn cup-btn-primary" id="cup-set-save">Simpan Pengaturan</button>
      <button class="cup-btn cup-btn-ghost" id="cup-set-clear">🗑️ Hapus Semua Data Lokal</button>
    </div>
  </section>

  <!-- Scripts: config → common (helpers/toast) → app -->
  <script src="config.js"></script>
  <script src="common.js"></script>
  <script src="cleanup-procedure-app.js"></script>
</body>
</html>
