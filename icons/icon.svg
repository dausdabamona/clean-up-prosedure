<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Lotus/Release Symbol -->
  <g transform="translate(256, 256)">
    <!-- Center circle (core) -->
    <circle cx="0" cy="0" r="40" fill="white" opacity="0.9"/>
    <!-- Petals (releasing energy) -->
    <g fill="white" opacity="0.8">
      <!-- Top petal -->
      <ellipse cx="0" cy="-90" rx="35" ry="60" transform="rotate(0)"/>
      <!-- Top-right petal -->
      <ellipse cx="0" cy="-90" rx="35" ry="60" transform="rotate(60)"/>
      <!-- Bottom-right petal -->
      <ellipse cx="0" cy="-90" rx="35" ry="60" transform="rotate(120)"/>
      <!-- Bottom petal -->
      <ellipse cx="0" cy="-90" rx="35" ry="60" transform="rotate(180)"/>
      <!-- Bottom-left petal -->
      <ellipse cx="0" cy="-90" rx="35" ry="60" transform="rotate(240)"/>
      <!-- Top-left petal -->
      <ellipse cx="0" cy="-90" rx="35" ry="60" transform="rotate(300)"/>
    </g>
    <!-- Inner glow -->
    <circle cx="0" cy="0" r="25" fill="#667eea"/>
  </g>
  <!-- Text "S" for Sedona -->
  <text x="256" y="280" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="white" text-anchor="middle">S</text>
</svg>
